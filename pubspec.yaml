name: credit_manager
description: تطبيق إدارة البيع بالآجل للعملاء
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Database
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Speech to text
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.1
  open_filex: ^4.5.0

  # Sharing
  share_plus: ^9.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  file_picker: ^8.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
